name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '21'

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Maven verify
        run: ./mvnw -B clean verify

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  validate-kubernetes:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Render single-node manifests
        run: kubectl kustomize k8s/single-node > /tmp/eureka-single-node.yaml

      - name: Validate single-node manifests
        run: kubectl apply --dry-run=client -f /tmp/eureka-single-node.yaml

      - name: Render peer-cluster manifests
        run: kubectl kustomize k8s/peer-cluster > /tmp/eureka-peer-cluster.yaml

      - name: Validate peer-cluster manifests
        run: kubectl apply --dry-run=client -f /tmp/eureka-peer-cluster.yaml

  build-and-publish-image:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - validate-kubernetes
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  render-manifests:
    name: Render deployment manifests
    runs-on: ubuntu-latest
    needs:
      - validate-kubernetes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Render single-node manifest bundle
        run: kubectl kustomize k8s/single-node > k8s-single-node-rendered.yaml

      - name: Render peer-cluster manifest bundle
        run: kubectl kustomize k8s/peer-cluster > k8s-peer-cluster-rendered.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: rendered-k8s-manifests
          path: |
            k8s-single-node-rendered.yaml
            k8s-peer-cluster-rendered.yaml

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs:
      - build-and-publish-image
      - render-manifests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment prerequisites
        id: deploy_gate
        shell: bash
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -n "$KUBE_CONFIG_DATA" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "KUBE_CONFIG_DATA is not configured. Skipping deployment."
          fi

      - name: Set up kubectl
        if: steps.deploy_gate.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        if: steps.deploy_gate.outputs.enabled == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"

      - name: Select overlay
        id: overlay
        if: steps.deploy_gate.outputs.enabled == 'true'
        shell: bash
        env:
          K8S_OVERLAY: ${{ vars.K8S_OVERLAY }}
        run: echo "overlay=${K8S_OVERLAY:-single-node}" >> "$GITHUB_OUTPUT"

      - name: Deploy selected overlay
        if: steps.deploy_gate.outputs.enabled == 'true'
        run: kubectl apply -k k8s/${{ steps.overlay.outputs.overlay }}

      - name: Verify rollout
        if: steps.deploy_gate.outputs.enabled == 'true'
        run: |
          if [ "${{ steps.overlay.outputs.overlay }}" = "peer-cluster" ]; then
            kubectl rollout status deployment/eureka-peer1 -n eureka --timeout=180s
            kubectl rollout status deployment/eureka-peer2 -n eureka --timeout=180s
          else
            kubectl rollout status deployment/eureka-server -n eureka --timeout=180s
          fi
