version: '3.8'

services:
  # --- СЕРВЕР РЕГИСТРАЦИИ ---
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      # Эти переменные заменяют ваш блок 'eureka.client' из кода
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
    healthcheck:
      # Используем проверку через bash, так как curl может отсутствовать в образе
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/8761"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fitness-network

  # --- ШЛЮЗ ---
  api-gateway:
    build: ./API_Gateway
    container_name: api-gateway
    ports:
      - "8075:8075"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - fitness-network

  # --- МИКРОСЕРВИСЫ ---
  trains-service:
    build: ./Trains-Service
    container_name: trains-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - fitness-network

  recommendation-service:
    build: ./Recommendation-Service
    container_name: recommendation-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - fitness-network

  training-service:
    build: ./Training-Servive # Проверьте опечатку в названии папки (Servive)
    container_name: training-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - fitness-network

networks:
  fitness-network:
    driver: bridge