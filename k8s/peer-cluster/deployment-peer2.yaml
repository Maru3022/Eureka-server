apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-peer2
  labels:
    app.kubernetes.io/name: eureka-server
    app.kubernetes.io/component: registry
    app.kubernetes.io/instance: peer2
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: eureka-server
      app.kubernetes.io/instance: peer2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eureka-server
        app.kubernetes.io/component: registry
        app.kubernetes.io/instance: peer2
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: eureka-peer2
          image: ghcr.io/example/eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: peer2
            - name: SERVER_PORT
              value: "8761"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: eureka-peer2.eureka.svc.cluster.local
            - name: EUREKA_DEFAULT_ZONE
              value: http://eureka-peer1.eureka.svc.cluster.local:8761/eureka/
            - name: EUREKA_REGISTER_WITH_EUREKA
              value: "true"
            - name: EUREKA_FETCH_REGISTRY
              value: "true"
            - name: EUREKA_SELF_PRESERVATION
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
