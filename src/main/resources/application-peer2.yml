# Profile for Eureka Server in cluster mode (second instance)
spring:
  application:
    name: eureka-server

server:
  port: ${SERVER_PORT:8762}

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:peer2}
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
  client:
    register-with-eureka: ${EUREKA_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://peer1:8761/eureka/}
