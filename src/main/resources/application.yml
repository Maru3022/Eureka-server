server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: eureka-server

info:
  app:
    name: Eureka Server
    description: Service discovery registry for the Fitness Microservices Platform
    deployment: kubernetes-ready

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${HOSTNAME:localhost}}
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
  client:
    register-with-eureka: ${EUREKA_REGISTER_WITH_EUREKA:false}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  server:
    wait-time-in-ms-when-sync-empty: ${EUREKA_WAIT_TIME_WHEN_SYNC_EMPTY:0}
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
